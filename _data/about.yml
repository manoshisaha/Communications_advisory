label: The Problem
headline: Most Organizations Have a Clarity Problem
quote: A well-told truth, grounded in evidence, is the most powerful strategic
  asset any organization can hold.
body1: They have built real things, grown revenues, created jobs, navigated
  impossible markets, and served communities. But when it comes time to tell
  that story to a regulator, investor, journalist, or skeptical public, the
  words fail them.
body2: In today's Bangladesh, social media spreads information very quickly.
  International audiences are observing more closely. If someone communicates
  badly or handles a situation poorly, the negative impact can become serious
  very quickly.
body3: We are not a PR agency. We do not write press releases and disappear. We
  are the advisors you call when the stakes are real.
