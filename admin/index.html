<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Communication Advisory — CMS</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #f5f5f5; }
    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; color: #444; gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #ddd;
      border-top-color: #c51a1b; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 14px; color: #888; margin: 0; }
    #loading small { font-size: 12px; color: #bbb; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading CMS...</p>
    <small>communicationsadvisory.com/admin</small>
  </div>
  <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loader = document.getElementById('loading');
        if (loader) loader.style.display = 'none';
      }, 3000);
    });
  </script>
</body>
</html>
