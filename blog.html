<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights – Communication Advisory</title>
<link rel="icon" href="/assets/CA_logo.png">
<meta name="description" content="Evidence-led thinking on communications, reputation, and leadership in Bangladesh.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--red:#c51a1b;--blue:#004874;--blue-dark:#003459;--cream:#faf8f5;--warm-gray:#f2efe9;--text-dark:#1a1a1a;--text-mid:#4a4a4a;--text-light:#888;--border:rgba(0,0,0,0.09)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--text-dark)}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--blue);text-decoration:none}
.logo span{color:var(--red)}
.back{font-size:.875rem;color:var(--text-mid);text-decoration:none;font-weight:500}
.back:hover{color:var(--red)}
.hero{background:var(--blue-dark);color:#fff;padding:4rem 2rem}
.hero-inner{max-width:1200px;margin:0 auto}
.label{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:1rem}
.htitle{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3rem);font-weight:700;line-height:1.2}
.hsub{font-size:1rem;color:rgba(255,255,255,.65);margin-top:1rem;max-width:500px;line-height:1.7}
.page{max-width:1200px;margin:0 auto;padding:3rem 2rem 5rem}
.filters{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:2.5rem}
.fb{background:var(--warm-gray);border:1px solid var(--border);border-radius:100px;padding:.5rem 1.25rem;font-size:.8125rem;font-weight:600;cursor:pointer;font-family:'Lato',sans-serif;transition:all .2s;color:var(--text-mid)}
.fb.active,.fb:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.card{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;text-decoration:none;color:inherit;transition:box-shadow .2s,transform .2s;display:block}
.card:hover{box-shadow:0 12px 40px rgba(0,0,0,.08);transform:translateY(-3px)}
.thumb{height:180px;position:relative;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover}
.bt1{background:linear-gradient(135deg,#003459,#004874);width:100%;height:100%}
.bt2{background:linear-gradient(135deg,#8b0000,#c51a1b);width:100%;height:100%}
.bt3{background:linear-gradient(135deg,#1a3a00,#2d6b00);width:100%;height:100%}
.tag{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.5);color:rgba(255,255,255,.9);font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.25rem .625rem;border-radius:100px;backdrop-filter:blur(4px)}
.cbody{padding:1.5rem}
.cmeta{font-size:.75rem;color:var(--text-light);margin-bottom:.5rem}
.ctitle{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;line-height:1.35;color:var(--blue);margin-bottom:.625rem}
.cex{font-size:.8125rem;line-height:1.75;color:var(--text-mid)}
.clink{display:inline-block;font-size:.8rem;font-weight:700;color:var(--red);margin-top:1rem;text-decoration:none}
#msg{color:var(--text-light);padding:3rem 0;text-align:center;font-size:.9rem}
footer{background:#0d1e2e;color:rgba(255,255,255,.5);padding:1.5rem 2rem;text-align:center;font-size:.8rem}
footer a{color:rgba(255,255,255,.35);text-decoration:none}
@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <a href="/" class="logo"><span>C</span>ommunication <span>A</span>dvisory</a>
  <a href="/" class="back">← Back to site</a>
</div>
<div class="hero">
  <div class="hero-inner">
    <div class="label">Insights &amp; Ideas</div>
    <h1 class="htitle">From the Desk of<br>Communication Advisory</h1>
    <p class="hsub">Evidence-led thinking on communications, reputation, and leadership in Bangladesh.</p>
  </div>
</div>
<div class="page">
  <div class="filters" id="filters"><button class="fb active" onclick="filter('all',this)">All</button></div>
  <div id="msg">Loading articles…</div>
  <div class="grid" id="grid"></div>
</div>
<footer><a href="/">communicationsadvisory.com</a> &nbsp;·&nbsp; © 2025 Communication Advisory</footer>
<script>
const tc=['bt1','bt2','bt3'];
let all=[];
function fm(t){const m=t.match(/^---\n([\s\S]*?)\n---/);if(!m)return{body:t};const f={};m[1].split('\n').forEach(l=>{const lm=l.match(/^([\w_]+):\s*(.*)$/);if(lm)f[lm[1].trim()]=lm[2].trim().replace(/^["']|["']$/g,'')});f.body=t.slice(m[0].length).trim();return f}
function dt(d){try{return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}catch(e){return d||''}}
function render(posts){
  const g=document.getElementById('grid');
  const msg=document.getElementById('msg');
  if(!posts.length){g.innerHTML='';msg.textContent='No articles found.';msg.style.display='block';return}
  msg.style.display='none';
  g.innerHTML=posts.map((p,i)=>{
    const thumb=p.image&&p.image!=='""'
      ?`<img src="${p.image}" alt="${p.title||''}">`
      :`<div class="${tc[i%3]}"></div>`;
    return`<a href="/post.html?slug=${p.slug}" class="card">
      <div class="thumb">${thumb}<span class="tag">${p.category||'Insight'}</span></div>
      <div class="cbody">
        <div class="cmeta">${dt(p.date)}${p.read_time?' · '+p.read_time:''}</div>
        <div class="ctitle">${p.title||''}</div>
        <div class="cex">${p.excerpt||''}</div>
        <span class="clink">Read Article →</span>
      </div>
    </a>`}).join('');
}
function filter(cat,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(cat==='all'?all:all.filter(p=>(p.category||'').toLowerCase()===cat.toLowerCase()));
}
async function load(){
  let slugs=[];
  try{const r=await fetch('/api/posts');if(r.ok)slugs=await r.json()}catch(e){}
  if(!slugs.length){try{const r=await fetch('/_posts/index.json');if(r.ok)slugs=await r.json()}catch(e){}}
  if(!slugs.length)slugs=['2025-05-01-when-one-news-cycle-can-fracture-credibility','2025-04-01-bangladesh-inflection-point','2025-03-01-leaders-voice-matters'];
  const posts=(await Promise.all(slugs.map(async s=>{
    try{const r=await fetch('/_posts/'+s+'.md');if(!r.ok)return null;const p=fm(await r.text());p.slug=s;return p}catch(e){return null}
  }))).filter(Boolean);
  posts.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  all=posts;
  // Build filters
  const cats=[...new Set(posts.map(p=>p.category).filter(Boolean))];
  const fr=document.getElementById('filters');
  cats.forEach(c=>{const b=document.createElement('button');b.className='fb';b.textContent=c;b.onclick=()=>filter(c,b);fr.appendChild(b)});
  render(posts);
}
load();
</script>
</body>
</html>
